 <!-- ddevelopment testing -->
<script>
const params = new URLSearchParams(location.search);

const extensionIds = [
  "igkdojpfnlnhcdeogiiealdechnfoead"
];

function tryExtension(index = 0) {
  if (index >= extensionIds.length) {
    document.body.innerText = "extension not installed";
    return;
  }

  chrome.runtime.sendMessage(
    extensionIds[index],
    {
      s: params.get("s"),
      u: params.get("u"),
      c: params.get("c")
    },
    (resp) => {
      if (chrome.runtime.lastError || !resp?.ok) {
        tryExtension(index + 1);
      } else {
        document.body.innerText = "connected";
      }
    }
  );
}

tryExtension();
</script>
